<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơ đồ Use Case - Hệ thống Website</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 30px;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        }
        svg { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1100" width="1200" height="1100">
    <defs>
        <style>
            .uc-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; text-anchor: middle; }
            .actor-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: 600; text-anchor: middle; }
            .actor-sub { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; text-anchor: middle; }
            .system-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 700; text-anchor: middle; }
        </style>
    </defs>

    <!-- ===== System Boundary ===== -->
    <rect x="300" y="30" width="600" height="1040" rx="16" ry="16"
          fill="none" stroke="#333" stroke-width="2" stroke-dasharray="10 5"/>
    <text x="600" y="62" class="system-title" fill="#222">
        Hệ thống Website (Desktop &amp; Mobile Web)
    </text>

    <!-- ===== USE CASES ===== -->
    <!-- UC1 -->
    <ellipse cx="600" cy="120" rx="170" ry="30" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="600" y="125" class="uc-text" fill="#1e40af">UC1: Xem tin tức, sự kiện</text>

    <!-- UC2 -->
    <ellipse cx="600" cy="195" rx="170" ry="30" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="600" y="200" class="uc-text" fill="#1e40af">UC2: Xem giới thiệu công ty</text>

    <!-- UC3 -->
    <ellipse cx="600" cy="270" rx="170" ry="30" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="600" y="275" class="uc-text" fill="#1e40af">UC3: Xem văn bản pháp luật</text>

    <!-- UC4 -->
    <ellipse cx="600" cy="345" rx="170" ry="30" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="600" y="350" class="uc-text" fill="#1e40af">UC4: Xem danh mục công trình</text>

    <!-- UC5 -->
    <ellipse cx="600" cy="420" rx="210" ry="30" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="600" y="425" class="uc-text" fill="#1e40af">UC5: Xem mực nước/vận hành ngày hiện tại</text>

    <!-- UC6 -->
    <ellipse cx="600" cy="495" rx="170" ry="30" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="600" y="500" class="uc-text" fill="#1e40af">UC6: Đăng nhập</text>

    <!-- UC7 -->
    <ellipse cx="600" cy="580" rx="220" ry="30" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="600" y="585" class="uc-text" fill="#166534">UC7: Xem mực nước/vận hành theo tuần/tháng</text>

    <!-- UC8 -->
    <ellipse cx="600" cy="655" rx="190" ry="30" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="600" y="660" class="uc-text" fill="#166534">UC8: Sử dụng bản đồ động KMS</text>

    <!-- UC9 -->
    <ellipse cx="600" cy="730" rx="175" ry="30" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="600" y="735" class="uc-text" fill="#166534">UC9: Tạo báo cáo vận hành</text>

    <!-- UC10 -->
    <ellipse cx="600" cy="805" rx="170" ry="30" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="600" y="810" class="uc-text" fill="#166534">UC10: Quản lý văn bản</text>

    <!-- UC11 -->
    <ellipse cx="600" cy="885" rx="170" ry="30" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
    <text x="600" y="890" class="uc-text" fill="#c2410c">UC11: Quản lý xí nghiệp</text>

    <!-- UC12 -->
    <ellipse cx="600" cy="960" rx="170" ry="30" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
    <text x="600" y="965" class="uc-text" fill="#c2410c">UC12: Quản lý người dùng</text>

    <!-- UC13 -->
    <ellipse cx="600" cy="1035" rx="180" ry="30" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
    <text x="600" y="1040" class="uc-text" fill="#c2410c">UC13: Quản lý nội dung website</text>


    <!-- ===== ACTOR: Guest (left, centered on UC1-UC6) ===== -->
    <g transform="translate(120, 255)">
        <circle cx="0" cy="0" r="16" fill="none" stroke="#2563eb" stroke-width="2.2"/>
        <line x1="0" y1="16" x2="0" y2="52" stroke="#2563eb" stroke-width="2.2"/>
        <line x1="-20" y1="30" x2="20" y2="30" stroke="#2563eb" stroke-width="2.2"/>
        <line x1="0" y1="52" x2="-16" y2="76" stroke="#2563eb" stroke-width="2.2"/>
        <line x1="0" y1="52" x2="16" y2="76" stroke="#2563eb" stroke-width="2.2"/>
        <text x="0" y="96" class="actor-label" fill="#2563eb">Người dùng</text>
        <text x="0" y="112" class="actor-label" fill="#2563eb">công cộng</text>
        <text x="0" y="128" class="actor-sub" fill="#60a5fa">(Guest)</text>
    </g>

    <!-- ===== ACTOR: User (left, centered on UC7-UC10) ===== -->
    <g transform="translate(120, 650)">
        <circle cx="0" cy="0" r="16" fill="none" stroke="#16a34a" stroke-width="2.2"/>
        <line x1="0" y1="16" x2="0" y2="52" stroke="#16a34a" stroke-width="2.2"/>
        <line x1="-20" y1="30" x2="20" y2="30" stroke="#16a34a" stroke-width="2.2"/>
        <line x1="0" y1="52" x2="-16" y2="76" stroke="#16a34a" stroke-width="2.2"/>
        <line x1="0" y1="52" x2="16" y2="76" stroke="#16a34a" stroke-width="2.2"/>
        <text x="0" y="96" class="actor-label" fill="#16a34a">Người dùng</text>
        <text x="0" y="112" class="actor-label" fill="#16a34a">đăng nhập</text>
        <text x="0" y="128" class="actor-sub" fill="#4ade80">(User)</text>
    </g>

    <!-- ===== ACTOR: Admin (right) ===== -->
    <g transform="translate(1080, 550)">
        <circle cx="0" cy="0" r="16" fill="none" stroke="#ea580c" stroke-width="2.2"/>
        <line x1="0" y1="16" x2="0" y2="52" stroke="#ea580c" stroke-width="2.2"/>
        <line x1="-20" y1="30" x2="20" y2="30" stroke="#ea580c" stroke-width="2.2"/>
        <line x1="0" y1="52" x2="-16" y2="76" stroke="#ea580c" stroke-width="2.2"/>
        <line x1="0" y1="52" x2="16" y2="76" stroke="#ea580c" stroke-width="2.2"/>
        <text x="0" y="96" class="actor-label" fill="#ea580c">Quản trị viên</text>
        <text x="0" y="112" class="actor-sub" fill="#fb923c">(Admin)</text>
    </g>


    <!-- ===== LINES: Guest → UC1..UC6 ===== -->
    <line x1="140" y1="265" x2="430" y2="120" stroke="#93c5fd" stroke-width="1.3"/>
    <line x1="140" y1="275" x2="430" y2="195" stroke="#93c5fd" stroke-width="1.3"/>
    <line x1="140" y1="280" x2="430" y2="270" stroke="#93c5fd" stroke-width="1.3"/>
    <line x1="140" y1="290" x2="430" y2="345" stroke="#93c5fd" stroke-width="1.3"/>
    <line x1="140" y1="300" x2="390" y2="420" stroke="#93c5fd" stroke-width="1.3"/>
    <line x1="140" y1="310" x2="430" y2="495" stroke="#93c5fd" stroke-width="1.3"/>

    <!-- ===== LINES: User → UC1..UC6 (public) ===== -->
    <line x1="140" y1="655" x2="430" y2="120" stroke="#86efac" stroke-width="1" opacity="0.5"/>
    <line x1="140" y1="655" x2="430" y2="195" stroke="#86efac" stroke-width="1" opacity="0.5"/>
    <line x1="140" y1="655" x2="430" y2="270" stroke="#86efac" stroke-width="1" opacity="0.5"/>
    <line x1="140" y1="660" x2="430" y2="345" stroke="#86efac" stroke-width="1" opacity="0.5"/>
    <line x1="140" y1="660" x2="390" y2="420" stroke="#86efac" stroke-width="1" opacity="0.5"/>
    <line x1="140" y1="660" x2="430" y2="495" stroke="#86efac" stroke-width="1" opacity="0.5"/>
    <!-- User → UC7..UC10 (own) -->
    <line x1="140" y1="665" x2="380" y2="580" stroke="#4ade80" stroke-width="1.3"/>
    <line x1="140" y1="670" x2="410" y2="655" stroke="#4ade80" stroke-width="1.3"/>
    <line x1="140" y1="680" x2="425" y2="730" stroke="#4ade80" stroke-width="1.3"/>
    <line x1="140" y1="690" x2="430" y2="805" stroke="#4ade80" stroke-width="1.3"/>

    <!-- ===== LINES: Admin → UC1..UC6 ===== -->
    <line x1="1060" y1="555" x2="770" y2="120" stroke="#fdba74" stroke-width="1" opacity="0.45"/>
    <line x1="1060" y1="555" x2="770" y2="195" stroke="#fdba74" stroke-width="1" opacity="0.45"/>
    <line x1="1060" y1="555" x2="770" y2="270" stroke="#fdba74" stroke-width="1" opacity="0.45"/>
    <line x1="1060" y1="560" x2="770" y2="345" stroke="#fdba74" stroke-width="1" opacity="0.45"/>
    <line x1="1060" y1="560" x2="810" y2="420" stroke="#fdba74" stroke-width="1" opacity="0.45"/>
    <line x1="1060" y1="560" x2="770" y2="495" stroke="#fdba74" stroke-width="1" opacity="0.45"/>
    <!-- Admin → UC7..UC10 -->
    <line x1="1060" y1="565" x2="820" y2="580" stroke="#fb923c" stroke-width="1.3" opacity="0.6"/>
    <line x1="1060" y1="570" x2="790" y2="655" stroke="#fb923c" stroke-width="1.3" opacity="0.6"/>
    <line x1="1060" y1="575" x2="775" y2="730" stroke="#fb923c" stroke-width="1.3" opacity="0.6"/>
    <line x1="1060" y1="580" x2="770" y2="805" stroke="#fb923c" stroke-width="1.3" opacity="0.6"/>
    <!-- Admin → UC11..UC13 -->
    <line x1="1060" y1="590" x2="770" y2="885" stroke="#ea580c" stroke-width="1.5" opacity="0.8"/>
    <line x1="1060" y1="595" x2="770" y2="960" stroke="#ea580c" stroke-width="1.5" opacity="0.8"/>
    <line x1="1060" y1="600" x2="780" y2="1035" stroke="#ea580c" stroke-width="1.5" opacity="0.8"/>


    <!-- ===== LEGEND ===== -->
    <!-- <rect x="310" y="55" width="14" height="14" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
    <text x="330" y="67" font-size="11" fill="#555" font-family="Segoe UI, Arial">Public (Guest + User + Admin)</text>

    <rect x="530" y="55" width="14" height="14" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
    <text x="550" y="67" font-size="11" fill="#555" font-family="Segoe UI, Arial">Logged-in (User + Admin)</text>

    <rect x="720" y="55" width="14" height="14" rx="3" fill="#ffedd5" stroke="#ea580c" stroke-width="1"/>
    <text x="740" y="67" font-size="11" fill="#555" font-family="Segoe UI, Arial">Admin Only</text> -->
</svg>
</body>
</html>
